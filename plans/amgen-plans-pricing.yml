description: >-
  Amgen does not publish a public developer API or pricing catalog. Therapeutic
  product pricing is regulated by national payers and Medicaid/Medicare in the
  US and is outside the scope of an API plan tier. There is no free quota,
  metered request price, or developer SKU to reconcile.
notes: >-
  Amgen is a biopharmaceutical manufacturer; pricing data on its therapies is
  not an API plan. If Amgen launches a public developer program (clinical
  trials, real-world evidence, supply chain), replace this scaffold with
  reconciled tier data.
sources:
  - https://www.amgen.com
plans:
  - id: amgen-no-public-api
    name: No Public API Program
    type: enterprise
    description: >-
      Placeholder entry. Amgen does not publish developer API tiers. Any
      partner data exchange (clinical, supply chain, pharmacovigilance) is
      handled bilaterally.
    entries:
      - label: Access
        description: Bilateral / partner-only
        name: access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'contact provider'
        userMultiplied: false
    elements:
      - name: Bilateral Partner Agreement
