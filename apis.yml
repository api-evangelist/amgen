name: Amgen
description: >-
  Amgen is committed to unlocking the potential of biology for patients suffering from serious
  illnesses by discovering, developing, manufacturing and delivering innovative human therapeutics.
  As a pioneer in biotechnology since 1980, Amgen uses living cells to make biologic medicines
  addressing cardiovascular metabolic conditions, oncology, inflammation, rare diseases, and bone health,
  operating in approximately 100 countries worldwide.
